name: Check Switzerland Slots (All Centres + All States)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run slot checker
      id: checker
      run: python check_slots.py

    - name: Create GitHub Issue if slot found
      if: steps.checker.outputs.slot == 'yes'
      uses: peter-evans/create-issue@v5
      with:
        title: "🎉 Switzerland Visa Slot AVAILABLE!"
        body: |
          A Switzerland visa slot is available.

          **Centre:** ${{ steps.checker.outputs.centre }}
          **URL:** ${{ steps.checker.outputs.url }}

          Go book immediately.
