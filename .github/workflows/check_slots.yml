name: Check Switzerland Slots (All Centres)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run slot checker
      id: checker
      run: python check_slots.py

    - name: Create issue if slot found
      if: steps.checker.outputs.slot == 'yes'
      uses: peter-evans/create-issue-from-file@v4
      with:
        title: "🎉 Switzerland Visa Slot AVAILABLE!"
        content-filepath: "./slot.md"
